kind: "AppHostingYaml"
apiVersion: "v1"
runConfig:
  minInstances: 0
  maxInstances: 10
  memoryMiB: 512
  cpu: 1
env:
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "chancescribe" # Update if different
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:424174249269:web:846deaaab4d4a8b49a987c"
# Secrets should be managed in the Firebase Console and will be available to Cloud Run
secrets:
  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY

